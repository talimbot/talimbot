[build]
builder = "NIXPACKS"

[build.nixpacksPlan]
providers = ["python"]

[build.nixpacks.phases.setup]
nixPkgs = ["python311", "pip"]

[build.nixpacks.phases.install]
cmds = ["pip install -r backend/requirements.txt"]

[deploy]
startCommand = "cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
