<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود - سیستم گروه‌بندی دانش آموزان</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body class="login-page">
    <div class="container">
        <div class="logo-section">
            <img src="images/logo.png" alt="لوگو">
        </div>
        
        <div class="header">
            <h1>سیستم گروه‌بندی دانش آموزان</h1>
            <p>خوش آمدید! لطفاً نقش خود را انتخاب کنید</p>
        </div>

        <div class="role-selector">
            <div class="role-option" id="studentRole" onclick="selectRole('student')">
                <div class="icon">🙋‍♀️</div>
                <h3>دانش آموز</h3>
            </div>
            <div class="role-option" id="teacherRole" onclick="selectRole('teacher')">
                <div class="icon">👩‍🏫</div>
                <h3>معلم</h3>
            </div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- ورود دانش آموز -->
            <div id="studentLogin" class="login-section" style="display: none;">
                <div class="form-group">
                    <label for="studentNumber">شماره دانش آموزی</label>
                    <input 
                        type="text" 
                        id="studentNumber" 
                        placeholder="شماره دانش آموزی خود را وارد کنید (مثال: S001)"
                        pattern="S\d{3}"
                        title="شماره دانش آموزی باید در فرمت S001 تا S030 باشد"
                    >
                </div>
            </div>

            <!-- ورود استاد -->
            <div id="teacherLogin" class="login-section" style="display: none;">
                <div class="form-group">
                    <label for="teacherPassword">رمز عبور</label>
                    <input 
                        type="password" 
                        id="teacherPassword" 
                        placeholder="رمز عبور معلم را وارد کنید"
                    >
                </div>
                <p style="color: var(--text-light); font-size: 0.85rem; text-align: center; margin-top: -10px;">
                    رمز عبور دمو: teacher123
                </p>
            </div>

            <button type="submit" class="btn btn-primary" id="loginButton" disabled>
                ورود به سیستم
            </button>
        </form>

        <div id="errorMessage" class="alert alert-warning" style="display: none; margin-top: 15px;">
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let selectedRole = null;

        // مقداردهی اولیه داده‌ها
        initializeData();

        function selectRole(role) {
            selectedRole = role;
            
            // بروزرسانی رابط کاربری
            document.getElementById('studentRole').classList.remove('selected');
            document.getElementById('teacherRole').classList.remove('selected');
            document.getElementById(role + 'Role').classList.add('selected');
            
            // نمایش فرم مربوطه
            document.getElementById('studentLogin').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('teacherLogin').style.display = role === 'teacher' ? 'block' : 'none';
            
            // فعال‌سازی دکمه ورود
            document.getElementById('loginButton').disabled = false;
            
            // مخفی کردن پیام خطا
            document.getElementById('errorMessage').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            if (selectedRole === 'student') {
                const studentNumber = document.getElementById('studentNumber').value.trim().toUpperCase();
                
                if (!studentNumber) {
                    showError('لطفاً شماره دانشجویی خود را وارد کنید');
                    return;
                }
                
                const student = getStudent(studentNumber);
                
                if (!student) {
                    showError('شماره دانشجویی نامعتبر است. لطفاً یک شماره معتبر (S001-S030) وارد کنید');
                    return;
                }
                
                // ذخیره دانشجو در session
                sessionStorage.setItem('currentStudent', studentNumber);
                
                // انتقال به داشبورد دانشجو
                window.location.href = 'student-dashboard.html';
                
            } else if (selectedRole === 'teacher') {
                const password = document.getElementById('teacherPassword').value;
                
                if (!password) {
                    showError('لطفاً رمز عبور استاد را وارد کنید');
                    return;
                }
                
                if (!checkTeacherPassword(password)) {
                    showError('رمز عبور نادرست است. دوباره تلاش کنید.');
                    return;
                }
                
                // ذخیره session استاد
                sessionStorage.setItem('isTeacher', 'true');
                
                // انتقال به داشبورد استاد
                window.location.href = 'teacher-dashboard.html';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // پشتیبانی از کلید Enter
        document.getElementById('studentNumber')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });

        document.getElementById('teacherPassword')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
