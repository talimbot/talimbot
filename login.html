<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Student Grouping System</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="icon">🎓</div>
            <h1>Student Grouping System</h1>
            <p>Welcome! Please select your role to continue</p>
        </div>

        <div class="role-selector">
            <div class="role-option" id="studentRole" onclick="selectRole('student')">
                <div class="icon">👨‍🎓</div>
                <h3>Student</h3>
            </div>
            <div class="role-option" id="teacherRole" onclick="selectRole('teacher')">
                <div class="icon">👨‍🏫</div>
                <h3>Teacher</h3>
            </div>
        </div>

        <form id="loginForm" onsubmit="handleLogin(event)">
            <!-- Student Login -->
            <div id="studentLogin" class="login-section" style="display: none;">
                <div class="form-group">
                    <label for="studentNumber">Student Number</label>
                    <input 
                        type="text" 
                        id="studentNumber" 
                        placeholder="Enter your student number (e.g., S001)"
                        pattern="S\d{3}"
                        title="Student number must be in format S001-S030"
                    >
                </div>
            </div>

            <!-- Teacher Login -->
            <div id="teacherLogin" class="login-section" style="display: none;">
                <div class="form-group">
                    <label for="teacherPassword">Password</label>
                    <input 
                        type="password" 
                        id="teacherPassword" 
                        placeholder="Enter teacher password"
                    >
                </div>
                <p style="color: var(--text-light); font-size: 0.85rem; text-align: center; margin-top: -10px;">
                    Demo password: teacher123
                </p>
            </div>

            <button type="submit" class="btn btn-primary" id="loginButton" disabled>
                Login
            </button>
        </form>

        <div id="errorMessage" class="alert alert-warning" style="display: none; margin-top: 20px;">
        </div>
    </div>

    <script src="data.js"></script>
    <script>
        let selectedRole = null;

        // Initialize data on page load
        initializeData();

        function selectRole(role) {
            selectedRole = role;
            
            // Update UI
            document.getElementById('studentRole').classList.remove('selected');
            document.getElementById('teacherRole').classList.remove('selected');
            document.getElementById(role + 'Role').classList.add('selected');
            
            // Show appropriate login form
            document.getElementById('studentLogin').style.display = role === 'student' ? 'block' : 'none';
            document.getElementById('teacherLogin').style.display = role === 'teacher' ? 'block' : 'none';
            
            // Enable login button
            document.getElementById('loginButton').disabled = false;
            
            // Hide error message
            document.getElementById('errorMessage').style.display = 'none';
        }

        function handleLogin(event) {
            event.preventDefault();
            
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.style.display = 'none';
            
            if (selectedRole === 'student') {
                const studentNumber = document.getElementById('studentNumber').value.trim().toUpperCase();
                
                if (!studentNumber) {
                    showError('Please enter your student number');
                    return;
                }
                
                const student = getStudent(studentNumber);
                
                if (!student) {
                    showError('Invalid student number. Please enter a valid student number (S001-S030)');
                    return;
                }
                
                // Store current student in session
                sessionStorage.setItem('currentStudent', studentNumber);
                
                // Redirect to student dashboard
                window.location.href = 'student-dashboard.html';
                
            } else if (selectedRole === 'teacher') {
                const password = document.getElementById('teacherPassword').value;
                
                if (!password) {
                    showError('Please enter the teacher password');
                    return;
                }
                
                if (!checkTeacherPassword(password)) {
                    showError('Invalid password. Please try again.');
                    return;
                }
                
                // Store teacher session
                sessionStorage.setItem('isTeacher', 'true');
                
                // Redirect to teacher dashboard
                window.location.href = 'teacher-dashboard.html';
            }
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }

        // Add enter key support
        document.getElementById('studentNumber')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });

        document.getElementById('teacherPassword')?.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                handleLogin(e);
            }
        });
    </script>
</body>
</html>
